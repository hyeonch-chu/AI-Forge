version: "3.9"

# ── Custom networks (L8 — network isolation) ──────────────────────────────────
# backend : data-layer and internal services (postgres, minio, mlflow, trainer)
# api     : web-facing services that the UI calls (mlflow, inference, ui)
# Postgres and MinIO are on the 'backend' network only — they are not
# reachable from the 'api' network, reducing their attack surface.
networks:
  backend:
    driver: bridge
  api:
    driver: bridge

# ── Named volumes for stateful monitoring services ────────────────────────────
volumes:
  loki_data:
  grafana_data:

services:

  # ── Data layer ──────────────────────────────────────────────────────────────

  postgres:
    image: "postgres:16"
    container_name: "postgres"
    working_dir: "/var/lib/postgresql/data"
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - "./postgres_data:/var/lib/postgresql/data"
    ports:
      # Port exposed for local development only — not reachable on the 'api' network
      - "${POSTGRES_PORT}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  minio:
    image: "minio/minio:latest"
    container_name: "minio"
    working_dir: "/data"
    command: >
      server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    volumes:
      - "./minio_data:/data"
    ports:
      # Ports exposed for local development only — not reachable on the 'api' network
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── MLOps layer ─────────────────────────────────────────────────────────────

  mlflow:
    build:
      context: ./mlflow
      dockerfile: Dockerfile
    container_name: mlflow
    working_dir: /mlflow_code
    command: >
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      --default-artifact-root s3://mlflow/
      --host 0.0.0.0 --port 5000
    environment:
      MLFLOW_S3_ENDPOINT_URL: "http://minio:9000"
      AWS_ACCESS_KEY_ID: "${MINIO_ROOT_USER}"
      AWS_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD}"
      MLFLOW_DEFAULT_ARTIFACT_ROOT: "${MLFLOW_ARTIFACT_ROOT}"
      MLFLOW_TRACKING_URI: "http://mlflow:5000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - "./mlflow:/mlflow_code"
    ports:
      - "${MLFLOW_PORT}:5000"
    restart: on-failure
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend  # reaches postgres and minio
      - api      # reachable by ui for experiment/model queries

  trainer:
    build:
      context: "./train_service"
      dockerfile: "Dockerfile"
    container_name: "trainer"
    working_dir: "/app"
    command: >
      bash -c "cd /app && tail -f /dev/null"
    environment:
      MLFLOW_TRACKING_URI: "http://mlflow:5000"
      AWS_ACCESS_KEY_ID: "${MINIO_ROOT_USER}"
      AWS_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD}"
      MLFLOW_S3_ENDPOINT_URL: "http://minio:9000"
    volumes:
      - "./train_service:/app"
    depends_on:
      mlflow:
        condition: service_healthy
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - backend

  inference:
    build:
      context: "./inference_service"
      dockerfile: "Dockerfile"
    container_name: "inference"
    working_dir: "/app"
    command: >
      bash -c "cd /app && uvicorn app:app --reload --host 0.0.0.0 --port 8000"
    environment:
      MODEL_STORE: "/app/models"
      MLFLOW_TRACKING_URI: "http://mlflow:5000"
      MLFLOW_MODEL_NAME: "${MLFLOW_MODEL_NAME:-yolo_detector}"
      MLFLOW_MODEL_STAGE: "${MLFLOW_MODEL_STAGE:-Production}"
      AWS_ACCESS_KEY_ID: "${MINIO_ROOT_USER}"
      AWS_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD}"
      MLFLOW_S3_ENDPOINT_URL: "http://minio:9000"
      # Optional Claude VLM backend — set BACKEND=claude to activate
      BACKEND: "${BACKEND:-mlflow}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      CLAUDE_MODEL: "${CLAUDE_MODEL:-claude-sonnet-4-6}"
      # API key auth (L1/L2) — leave empty to disable auth in dev
      INFERENCE_ADMIN_KEY: "${INFERENCE_ADMIN_KEY:-}"
      INFERENCE_VIEWER_KEY: "${INFERENCE_VIEWER_KEY:-}"
    volumes:
      - "./inference_service:/app"
    depends_on:
      mlflow:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "${INFER_PORT}:8000"
    restart: on-failure
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - backend  # reaches mlflow and minio
      - api      # reachable by ui

  # ── Frontend ────────────────────────────────────────────────────────────────

  ui:
    image: "node:18"
    container_name: "ui"
    working_dir: "/app"
    command: >
      bash -c "cd /app && npm install && npm run dev"
    environment:
      NODE_ENV: "development"
      # Next.js API routes use these to reach backend services on the Docker network
      MLFLOW_TRACKING_URI: "http://mlflow:5000"
      INFERENCE_URL: "http://inference:8000"
    volumes:
      - "./ui:/app"
    ports:
      - "${UI_PORT}:3000"
    networks:
      - api  # reaches mlflow and inference only — no direct access to postgres/minio

  # ── Monitoring (M9) ─────────────────────────────────────────────────────────

  loki:
    image: "grafana/loki:2.9.0"
    container_name: "loki"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - "./monitoring/loki-config.yaml:/etc/loki/local-config.yaml:ro"
      - "loki_data:/loki"
    ports:
      - "3100:3100"
    restart: unless-stopped
    networks:
      - backend  # promtail and grafana reach loki internally

  promtail:
    image: "grafana/promtail:2.9.0"
    container_name: "promtail"
    command: -config.file=/etc/promtail/config.yaml
    volumes:
      # Read Docker container logs from the host
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "/var/lib/docker/containers:/var/lib/docker/containers:ro"
      - "./monitoring/promtail-config.yaml:/etc/promtail/config.yaml:ro"
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - backend

  grafana:
    image: "grafana/grafana:10.2.0"
    container_name: "grafana"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Disable telemetry in local dev
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - "./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro"
      - "grafana_data:/var/lib/grafana"
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - backend  # reaches loki
      - api      # exposed to users via port mapping
