# Grafana datasource provisioning — auto-configures Loki on container start.
# No manual datasource setup required in the Grafana UI.

apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    version: 1
    editable: false
    jsonData:
      maxLines: 1000
