# Promtail configuration for AI-Forge.
# Collects Docker container logs from the host and ships them to Loki.
# Requires the following Docker socket mount in docker-compose.yaml:
#   /var/run/docker.sock:/var/run/docker.sock:ro
# And the container log directory:
#   /var/lib/docker/containers:/var/lib/docker/containers:ro

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          # Only collect logs from containers with a 'com.docker.compose.project' label
          - name: label
            values: ["com.docker.compose.project"]
    relabel_configs:
      # Use the container name as the 'container' label in Loki
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"
      # Preserve the log stream (stdout/stderr) as a label
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: "stream"
      # Add compose service name for easy filtering
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: "service"
    pipeline_stages:
      # Parse the structured JSON logs emitted by inference_service and train_service
      - json:
          expressions:
            level: level
            logger: logger
            message: message
      - labels:
          level:
          logger:
